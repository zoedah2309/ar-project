<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body { margin: 0; }
    model-viewer { width: 100%; height: 100vh; }
  </style>
</head>
<body>

<model-viewer
  src="Textured_mesh_3.glb"
  ar
  ar-modes="webxr"
  camera-controls>
  <button slot="ar-button"
    style="position:absolute;bottom:20px;left:20px;padding:12px 18px;font-size:18px;">
    View in AR
  </button>
</model-viewer>

</body>
</html>
